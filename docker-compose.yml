services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskhub
      POSTGRES_PASSWORD: taskhub
      POSTGRES_DB: taskhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  pgdata:
